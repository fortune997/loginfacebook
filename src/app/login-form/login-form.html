<div class="w-[400px] shrink-0 flex flex-col justify-center px-10 py-10 h-full">

  <p class="text-[17px] font-bold text-[#1c1e21] mb-4">Se connecter à Facebook</p>

  <input
    [(ngModel)]="email"
    type="email"
    placeholder="E-mail ou numéro de mobile"
    class="w-full h-[52px] border-[1.5px] border-[#dddfe2] rounded-lg px-4
           text-[16px] text-[#1c1e21] placeholder-[#9197a3] outline-none mb-3
           focus:border-[#1877f2] focus:ring-2 focus:ring-[#1877f2]/15 transition"
  />

  <input
    [(ngModel)]="password"
    type="password"
    placeholder="Mot de passe"
    class="w-full h-[52px] border-[1.5px] border-[#dddfe2] rounded-lg px-4
           text-[16px] text-[#1c1e21] placeholder-[#9197a3] outline-none mb-3
           focus:border-[#1877f2] focus:ring-2 focus:ring-[#1877f2]/15 transition"
  />

  <button
    (click)="onLogin()"
    class="w-full h-[50px] bg-[#1877f2] hover:bg-[#166fe5] text-white
           rounded-lg text-[18px] font-semibold transition cursor-pointer"
  >
    Se connecter
  </button>

  <a href="#"
     class="block text-center text-[#1877f2] text-sm py-[14px] hover:underline">
    Mot de passe oublié ?
  </a>

  <hr class="border-[1.5px] border-[#e4e6eb] mb-4" />

  <button
    (click)="onCreateAccount()"
    class="w-full h-[50px] bg-white hover:bg-[#f0f6ff] text-[#1877f2]
           border-[1.5px] border-[#1877f2] rounded-lg text-[16px]
           font-medium transition cursor-pointer"
  >
    Créer un nouveau compte
  </button>

  <p class="text-center text-[#8a8d91] text-sm mt-4">∞ Meta</p>

</div>
